<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMAGE SIZE CHECK — 画像サイズ確認ツール</title>
<link rel="icon" type="image/x-icon" href="img/favicon.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Limelight&family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

  :root{
    --black:#111111;
    --line:#d8d8d8;
    --line-dark:#111111;
    --paper:#ffffff;
    --gray:#8a8a8a;
    --accent:#b8935f;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Noto Sans JP', 'Hiragino Sans', sans-serif;
    color:var(--black);
    background:var(--paper);
    -webkit-font-smoothing:antialiased;
    letter-spacing:0.02em;
  }

  /* ===== Header ===== */
  header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:32px;
    max-width:1040px;
    margin:0 auto;
    padding:48px 24px;
  }
  .hero-image{
    display:block;
    width:250px;
    max-width:40%;
    aspect-ratio:250 / 312;
    object-fit:cover;
    flex-shrink:0;
  }
  .header-text{
    text-align:left;
  }
  .kicker{
    font-size:11px;
    letter-spacing:0.4em;
    color:var(--gray);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  h1.logo{
    font-family:'Limelight', 'Noto Sans JP', sans-serif;
    font-weight:400;
    font-size:clamp(20px, 3vw, 36px);
    letter-spacing:0.02em;
    line-height:1.15;
    white-space:nowrap;
  }
  @media (max-width:640px){
    header{ flex-direction:column; padding:40px 20px; }
    .hero-image{ max-width:60%; }
    .header-text{ text-align:center; }
    h1.logo{ white-space:normal; font-size:clamp(20px, 6vw, 30px); }
  }
  main{
    max-width:1040px;
    margin:0 auto;
    padding:32px 24px 120px;
  }

  /* ===== Drop zone ===== */
  #dropzone{
    background:#f2f2f2;
    padding:70px 24px;
    text-align:center;
    cursor:pointer;
    transition:background .25s ease;
    position:relative;
  }
  #dropzone.dragover{
    background:#e8e8e8;
  }
  #dropzone .dz-mark{
    font-family:'Noto Sans JP', sans-serif;
    font-weight:500;
    font-size:15px;
    letter-spacing:0.15em;
    margin-bottom:10px;
  }
  #dropzone .dz-sub{
    font-size:11.5px;
    color:var(--gray);
    letter-spacing:0.1em;
  }
  #fileInput{ display:none; }

  /* ===== Toolbar ===== */
  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:16px;
    margin-top:48px;
    margin-bottom:18px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line-dark);
  }
  .toolbar .count{
    font-size:12px;
    letter-spacing:0.15em;
    color:var(--gray);
    text-transform:uppercase;
  }
  .toolbar .count b{ color:var(--black); font-weight:700; }
  .toolbar-actions{
    display:flex;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
  }
  .bulk-btn{
    background:none;
    border:1px solid var(--line-dark);
    color:var(--black);
    cursor:pointer;
    font-family:'Noto Sans JP', sans-serif;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:9px 16px;
    white-space:nowrap;
    transition:background .2s ease, color .2s ease, opacity .2s ease;
  }
  .bulk-btn:hover{ background:var(--black); color:#fff; }
  .bulk-btn:disabled{
    opacity:0.35;
    cursor:not-allowed;
    background:none;
    color:var(--black);
  }
  .clear-btn{
    background:none;
    border:none;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--black);
    cursor:pointer;
    border-bottom:1px solid var(--black);
    padding-bottom:2px;
  }
  .clear-btn:hover{ color:var(--accent); border-color:var(--accent); }

  /* ===== Table ===== */
  #results{ width:100%; overflow-x:auto; }
  .empty-msg{
    text-align:center;
    color:var(--gray);
    font-size:12px;
    letter-spacing:0.1em;
    padding:40px 0;
    display:none;
  }

  table{
    width:100%;
    border-collapse:collapse;
  }
  thead th{
    font-size:10.5px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--gray);
    font-weight:500;
    text-align:left;
    padding:10px 12px;
    border-bottom:1px solid var(--line-dark);
    white-space:nowrap;
  }
  tbody td{
    padding:16px 12px;
    border-bottom:1px solid var(--line);
    font-size:13px;
    vertical-align:middle;
  }
  tbody tr:hover{ background:#fafafa; }

  td.thumb-cell{ width:64px; }
  .thumb{
    width:56px;
    height:56px;
    object-fit:contain;
    background:#f7f7f7;
    display:block;
  }
  td.name-cell{ max-width:260px; }
  .fname{
    font-weight:500;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    display:block;
  }
  td.dim-cell{
    font-family:'Noto Sans JP', sans-serif;
    font-weight:700;
    font-size:20px;
    letter-spacing:0.02em;
    white-space:nowrap;
  }
  td.resize-cell{ white-space:nowrap; }
  .dim-input{
    width:64px;
    font-family:'Noto Sans JP', sans-serif;
    font-weight:700;
    font-size:19px;
    letter-spacing:0.02em;
    color:var(--black);
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    padding:2px 0;
    -moz-appearance:textfield;
  }
  .dim-input::-webkit-outer-spin-button,
  .dim-input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .dim-input:focus{
    outline:none;
    border-bottom-color:var(--accent);
  }
  .dim-cell .unit, .resize-cell .unit{
    color:var(--gray);
    font-size:11px;
  }
  td.type-cell{
    color:var(--gray);
    text-transform:uppercase;
    font-size:11px;
    letter-spacing:0.08em;
  }
  .remove-btn{
    background:none;
    border:none;
    color:var(--gray);
    cursor:pointer;
    font-size:16px;
    line-height:1;
    padding:4px 8px;
    transition:color .2s;
  }
  .remove-btn:hover{ color:var(--black); }

  .export-btn{
    background:none;
    border:1px solid var(--line-dark);
    color:var(--black);
    cursor:pointer;
    font-family:'Noto Sans JP', sans-serif;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    padding:7px 14px;
    white-space:nowrap;
    transition:background .2s ease, color .2s ease;
  }
  .export-btn:hover{ background:var(--black); color:#fff; }

  footer{
    text-align:center;
    padding:28px 24px;
    border-top:1px solid var(--line);
    font-size:10.5px;
    letter-spacing:0.15em;
    color:var(--gray);
    text-transform:uppercase;
  }

  @media (max-width:640px){
    #dropzone{ padding:48px 16px; }
    thead th:nth-child(3), tbody td:nth-child(3){ display:none; }
    td.name-cell{ max-width:120px; }
  }
</style>
</head>
<body>

<header>
  <img class="hero-image" id="heroImage" src="" alt="">
  <div class="header-text">
    <div class="kicker">Utility Tool</div>
    <h1 class="logo">Super Image Size Checker</h1>
  </div>
</header>

<main>
  <div id="dropzone">
    <div class="dz-mark">ここに画像ファイルをドロップ</div>
    <div class="dz-sub">またはクリックしてファイルを選択（複数選択可）</div>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="toolbar">
    <div class="count"><b id="fileCount">0</b> Files</div>
    <div class="toolbar-actions">
      <button class="bulk-btn" id="downloadAllBtn" disabled>Download All (Resized)</button>
      <button class="bulk-btn" id="downloadAllWebpBtn" disabled>Download All as WebP</button>
      <button class="clear-btn" id="clearBtn">Clear All</button>
    </div>
  </div>

  <div id="results">
    <table id="resultsTable">
      <thead>
        <tr>
          <th>Preview</th>
          <th>File Name</th>
          <th>Type</th>
          <th>Size</th>
          <th>Width</th>
          <th>Height</th>
          <th>New Width</th>
          <th>New Height</th>
          <th></th>
          <th></th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
    <div class="empty-msg" id="emptyMsg">画像がありません</div>
  </div>
</main>

<footer>Image Size Check Tool</footer>

<script>
  const heroImages = [
    'img/img_01_web.jpg',
    'img/img_02_web.jpg',
    'img/img_03_web.jpg',
    'img/img_04_web.jpg',
    'img/img_05_web.jpg'
  ];
  document.getElementById('heroImage').src = heroImages[Math.floor(Math.random() * heroImages.length)];

  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const resultsBody = document.getElementById('resultsBody');
  const emptyMsg = document.getElementById('emptyMsg');
  const fileCount = document.getElementById('fileCount');
  const clearBtn = document.getElementById('clearBtn');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  const downloadAllWebpBtn = document.getElementById('downloadAllWebpBtn');

  let counter = 0;

  function formatBytes(bytes){
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function updateEmptyState(){
    const hasRows = resultsBody.children.length > 0;
    emptyMsg.style.display = hasRows ? 'none' : 'block';
    document.getElementById('resultsTable').style.display = hasRows ? 'table' : 'none';
    fileCount.textContent = resultsBody.children.length;
    downloadAllBtn.disabled = !hasRows;
    downloadAllWebpBtn.disabled = !hasRows;
  }

  function addImageRow(file){
    if (!file.type.startsWith('image/')) return;

    const id = 'row-' + (++counter);
    const url = URL.createObjectURL(file);
    const img = new Image();

    img.onload = function(){
      const tr = document.createElement('tr');
      tr.id = id;
      tr.dataset.ratio = img.naturalWidth / img.naturalHeight;
      tr.dataset.type = file.type;
      const dotIndex = file.name.lastIndexOf('.');
      tr.dataset.baseName = dotIndex > 0 ? file.name.slice(0, dotIndex) : file.name;
      tr.innerHTML = `
        <td class="thumb-cell"><img class="thumb" src="${url}" alt=""></td>
        <td class="name-cell"><span class="fname" title="${file.name}">${file.name}</span></td>
        <td class="type-cell">${file.type.replace('image/', '') || '—'}</td>
        <td>${formatBytes(file.size)}</td>
        <td class="dim-cell">${img.naturalWidth}<span class="unit"> px</span></td>
        <td class="dim-cell">${img.naturalHeight}<span class="unit"> px</span></td>
        <td class="resize-cell"><input type="number" class="dim-input w-input" value="${img.naturalWidth}" min="1"><span class="unit"> px</span></td>
        <td class="resize-cell"><input type="number" class="dim-input h-input" value="${img.naturalHeight}" min="1"><span class="unit"> px</span></td>
        <td><button class="export-btn" data-target="${id}">Download</button></td>
        <td><button class="remove-btn" data-target="${id}" title="削除">×</button></td>
      `;
      resultsBody.appendChild(tr);
      updateEmptyState();
    };
    img.onerror = function(){
      URL.revokeObjectURL(url);
    };
    img.src = url;
  }

  function exportImage(row){
    const w = parseInt(row.querySelector('.w-input').value, 10);
    const h = parseInt(row.querySelector('.h-input').value, 10);
    if (!(w > 0) || !(h > 0)) return;

    const supportedTypes = ['image/jpeg', 'image/png', 'image/webp'];
    const mimeType = supportedTypes.includes(row.dataset.type) ? row.dataset.type : 'image/png';
    const ext = mimeType === 'image/jpeg' ? 'jpg' : mimeType === 'image/webp' ? 'webp' : 'png';
    const baseName = row.dataset.baseName || 'image';
    const thumbSrc = row.querySelector('.thumb').src;

    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob((blob) => {
        if (!blob) return;
        downloadBlob(blob, `${baseName}_${w}x${h}.${ext}`);
      }, mimeType, 0.92);
    };
    img.src = thumbSrc;
  }

  // ----- Minimal ZIP writer (store method, no compression needed since
  // images are already JPEG/PNG/WebP encoded) -----
  const CRC_TABLE = (function(){
    const table = [];
    for (let n = 0; n < 256; n++){
      let c = n;
      for (let k = 0; k < 8; k++){
        c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      }
      table[n] = c >>> 0;
    }
    return table;
  })();

  function crc32(bytes){
    let crc = 0 ^ -1;
    for (let i = 0; i < bytes.length; i++){
      crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ bytes[i]) & 0xFF];
    }
    return (crc ^ -1) >>> 0;
  }

  function createZip(files){
    const encoder = new TextEncoder();
    const localParts = [];
    const centralParts = [];
    let offset = 0;

    files.forEach((file) => {
      const nameBytes = encoder.encode(file.name);
      const data = file.data;
      const crc = crc32(data);
      const size = data.length;

      const localHeader = new Uint8Array(30 + nameBytes.length);
      const ldv = new DataView(localHeader.buffer);
      ldv.setUint32(0, 0x04034b50, true);
      ldv.setUint16(4, 20, true);
      ldv.setUint16(6, 0, true);
      ldv.setUint16(8, 0, true);
      ldv.setUint16(10, 0, true);
      ldv.setUint16(12, 0, true);
      ldv.setUint32(14, crc, true);
      ldv.setUint32(18, size, true);
      ldv.setUint32(22, size, true);
      ldv.setUint16(26, nameBytes.length, true);
      ldv.setUint16(28, 0, true);
      localHeader.set(nameBytes, 30);

      localParts.push(localHeader, data);

      const centralHeader = new Uint8Array(46 + nameBytes.length);
      const cdv = new DataView(centralHeader.buffer);
      cdv.setUint32(0, 0x02014b50, true);
      cdv.setUint16(4, 20, true);
      cdv.setUint16(6, 20, true);
      cdv.setUint16(8, 0, true);
      cdv.setUint16(10, 0, true);
      cdv.setUint16(12, 0, true);
      cdv.setUint16(14, 0, true);
      cdv.setUint32(16, crc, true);
      cdv.setUint32(20, size, true);
      cdv.setUint32(24, size, true);
      cdv.setUint16(28, nameBytes.length, true);
      cdv.setUint16(30, 0, true);
      cdv.setUint16(32, 0, true);
      cdv.setUint16(34, 0, true);
      cdv.setUint16(36, 0, true);
      cdv.setUint32(38, 0, true);
      cdv.setUint32(42, offset, true);
      centralHeader.set(nameBytes, 46);

      centralParts.push(centralHeader);
      offset += localHeader.length + data.length;
    });

    const centralOffset = offset;
    const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);

    const eocd = new Uint8Array(22);
    const edv = new DataView(eocd.buffer);
    edv.setUint32(0, 0x06054b50, true);
    edv.setUint16(4, 0, true);
    edv.setUint16(6, 0, true);
    edv.setUint16(8, files.length, true);
    edv.setUint16(10, files.length, true);
    edv.setUint32(12, centralSize, true);
    edv.setUint32(16, centralOffset, true);
    edv.setUint16(20, 0, true);

    return new Blob([...localParts, ...centralParts, eocd], { type: 'application/zip' });
  }

  function resizeToBytes(thumbSrc, w, h, mimeType, quality){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob((blob) => {
          if (!blob){ reject(new Error('toBlob failed')); return; }
          blob.arrayBuffer().then((buf) => resolve(new Uint8Array(buf)));
        }, mimeType, quality);
      };
      img.onerror = () => reject(new Error('image load failed'));
      img.src = thumbSrc;
    });
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  async function downloadAllResized(forceWebp){
    const rows = Array.from(resultsBody.querySelectorAll('tr'));
    if (!rows.length) return;

    const files = [];
    for (const row of rows){
      const w = parseInt(row.querySelector('.w-input').value, 10);
      const h = parseInt(row.querySelector('.h-input').value, 10);
      if (!(w > 0) || !(h > 0)) continue;

      const baseName = row.dataset.baseName || 'image';
      const thumbSrc = row.querySelector('.thumb').src;

      let mimeType, ext;
      if (forceWebp){
        mimeType = 'image/webp';
        ext = 'webp';
      } else {
        const supportedTypes = ['image/jpeg', 'image/png', 'image/webp'];
        mimeType = supportedTypes.includes(row.dataset.type) ? row.dataset.type : 'image/jpeg';
        ext = mimeType === 'image/jpeg' ? 'jpg' : mimeType === 'image/webp' ? 'webp' : 'png';
      }
      const quality = mimeType === 'image/png' ? undefined : 0.9;

      try {
        const bytes = await resizeToBytes(thumbSrc, w, h, mimeType, quality);
        files.push({ name: `${baseName}_${w}x${h}.${ext}`, data: bytes });
      } catch (err){
        console.error('Failed to resize', baseName, err);
      }
    }

    if (!files.length) return;

    const zipBlob = createZip(files);
    downloadBlob(zipBlob, forceWebp ? 'resized-images-webp.zip' : 'resized-images.zip');
  }

  function handleFiles(fileList){
    Array.from(fileList).forEach(addImageRow);
  }

  dropzone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
    fileInput.value = '';
  });

  ['dragenter', 'dragover'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.add('dragover');
    });
  });

  ['dragleave', 'drop'].forEach(evt => {
    dropzone.addEventListener(evt, (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropzone.classList.remove('dragover');
    });
  });

  dropzone.addEventListener('drop', (e) => {
    const dt = e.dataTransfer;
    if (dt && dt.files) handleFiles(dt.files);
  });

  resultsBody.addEventListener('input', (e) => {
    const row = e.target.closest('tr');
    if (!row) return;
    const ratio = parseFloat(row.dataset.ratio);
    if (!ratio) return;

    if (e.target.classList.contains('w-input')){
      const w = parseFloat(e.target.value);
      if (w > 0) row.querySelector('.h-input').value = Math.round(w / ratio);
    } else if (e.target.classList.contains('h-input')){
      const h = parseFloat(e.target.value);
      if (h > 0) row.querySelector('.w-input').value = Math.round(h * ratio);
    }
  });

  resultsBody.addEventListener('click', (e) => {
    if (e.target.classList.contains('remove-btn')){
      const row = document.getElementById(e.target.dataset.target);
      const img = row.querySelector('img.thumb');
      if (img) URL.revokeObjectURL(img.src);
      row.remove();
      updateEmptyState();
    } else if (e.target.classList.contains('export-btn')){
      const row = document.getElementById(e.target.dataset.target);
      if (row) exportImage(row);
    }
  });

  downloadAllBtn.addEventListener('click', () => downloadAllResized(false));
  downloadAllWebpBtn.addEventListener('click', () => downloadAllResized(true));

  clearBtn.addEventListener('click', () => {
    Array.from(resultsBody.querySelectorAll('img.thumb')).forEach(img => URL.revokeObjectURL(img.src));
    resultsBody.innerHTML = '';
    updateEmptyState();
  });

  updateEmptyState();
</script>

</body>
</html>
